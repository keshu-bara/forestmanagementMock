<title>Forest Mock Test</title>

<style>
* {
    box-sizing: border-box;
}

:root {
    --bg: #f3f6fb;
    --panel: #ffffff;
    --panel-border: #d8e1f0;
    --text: #1d2a3b;
    --muted: #5d6b7f;
    --accent: #1a73e8;
    --accent-hover: #145cb8;
    --success-bg: #e6f6ec;
    --success-border: #5fbe82;
    --danger-bg: #fde9e7;
    --danger-border: #e07165;
}

body {
    margin: 0;
    padding: 24px 14px 40px;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background:
        radial-gradient(circle at 10% 0%, #dce9ff 0%, transparent 32%),
        radial-gradient(circle at 90% 20%, #e2f8f2 0%, transparent 30%),
        var(--bg);
    color: var(--text);
}

.container {
    max-width: 980px;
    margin: 0 auto;
}

.header {
    background: linear-gradient(120deg, #0f3d7a, #1a73e8 52%, #21a39c);
    color: #fff;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 18px;
    box-shadow: 0 14px 35px rgba(18, 52, 99, 0.22);
}

.header h1 {
    margin: 0 0 8px;
    font-size: 1.9rem;
    letter-spacing: 0.2px;
}

.header p {
    margin: 0;
    opacity: 0.94;
}

.toolbar {
    position: sticky;
    top: 12px;
    z-index: 50;
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
    background: rgba(255, 255, 255, 0.93);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 16px;
    backdrop-filter: blur(8px);
}

.meta {
    color: var(--muted);
    font-size: 0.95rem;
}

button {
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.2s ease;
}

button:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
}

.question {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 16px;
    margin: 12px 0;
    box-shadow: 0 7px 18px rgba(24, 53, 88, 0.06);
    transition: border-color 0.2s ease, background 0.2s ease;
}

.question p {
    margin: 0 0 12px;
    font-weight: 600;
    line-height: 1.4;
}

.option {
    display: block;
    margin: 7px 0;
    padding: 8px 10px;
    border-radius: 8px;
    transition: background 0.2s ease;
}

.option:hover {
    background: #f3f7ff;
}

.correct {
    background: var(--success-bg);
    border-color: var(--success-border);
}

.wrong {
    background: var(--danger-bg);
    border-color: var(--danger-border);
}

.answer {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed #c5d2e5;
    font-size: 0.95rem;
    color: #20344d;
}

.score-card {
    margin-top: 20px;
    margin-bottom: 8px;
    background: #fff;
    border: 1px solid var(--panel-border);
    border-left: 5px solid #1a73e8;
    border-radius: 12px;
    padding: 14px;
    box-shadow: 0 7px 18px rgba(24, 53, 88, 0.08);
    font-size: 1.1rem;
    font-weight: 700;
}

.sub-result {
    color: var(--muted);
    margin-top: 6px;
    font-size: 0.95rem;
    font-weight: 500;
}

@media (max-width: 700px) {
    body {
        padding: 16px 10px 28px;
    }

    .header {
        padding: 18px;
    }

    .header h1 {
        font-size: 1.45rem;
    }

    .toolbar {
        flex-direction: column;
        align-items: stretch;
    }

    button {
        width: 100%;
    }
}
</style>
</head>

    let html=`<p>${i+1}. ${item.q}</p>`;

    item.o.forEach((opt,j)=>{
        html+=`<label class="option"><input type="radio" name="q${i}" value="${j}"> ${opt}</label>`;
    });

    html+=`<div class="answer" id="ans${i}" style="display:none;"></div>`;
    div.innerHTML=html;
    quiz.appendChild(div);
});

document.addEventListener("change", (e) => {
    if (e.target && e.target.type === "radio") {
        updateAttemptInfo();
    }
});

function updateAttemptInfo() {
    const answered = questions.reduce((count, _, i) => {
        return count + (document.querySelector(`input[name="q${i}"]:checked`) ? 1 : 0);
    }, 0);

    document.getElementById("attemptInfo").innerText =
        `Questions: ${questions.length} | Answered: ${answered}`;
}

updateAttemptInfo();

// Submit
function submitQuiz(){
    let score=0;
    let answered = 0;

    questions.forEach((item,i)=>{
        let sel=document.querySelector(`input[name="q${i}"]:checked`);
        let box=document.getElementById("q"+i);
        let ans=document.getElementById("ans"+i);

        box.classList.remove("correct", "wrong");

        if (sel) {
            answered++;
        }

        if(sel && parseInt(sel.value, 10)===item.a){
            score++;
            box.classList.add("correct");
        }else{
            box.classList.add("wrong");
        }

        ans.style.display="block";
        ans.innerText="Correct: "+item.o[item.a];
    });

    const percent = Math.round((score / questions.length) * 100);
    const result = document.getElementById("result");
    result.style.display = "block";
    result.innerHTML =
        `Score: ${score} / ${questions.length} (${percent}%)` +
        `<div class="sub-result">Answered: ${answered} | Unanswered: ${questions.length - answered}</div>`;

    document.getElementById("submitBtn").innerText = "Recalculate Result";
    result.scrollIntoView({ behavior: "smooth", block: "center" });
}

</script>

</body>
</html>
